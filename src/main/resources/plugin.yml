name: DonutCore
version: '${project.version}'
main: ro.andreilarazboi.donutcore.DonutCore
api-version: '1.21'
authors: [Andreilarazboi]
description: DonutCore - Modular plugin with DonutSMP like modules.

softdepend:
  - PlaceholderAPI
  - Vault

commands:
  sell:
    description: Open the sell menu
    usage: /sell
    permission: donutcore.sell.use
  sellmulti:
    description: Open the new sell menu
    usage: /sellmulti
    permission: donutcore.sell.use
  worth:
    description: Check item worth
    usage: /worth
    permission: donutcore.sell.use
  toggleworth:
    description: Toggle worth lore display
    usage: /toggleworth
    permission: donutcore.sell.use
  sellhistory:
    description: View sell history
    usage: /sellhistory
    permission: donutcore.sell.use
  donutsell:
    description: Admin sell command
    usage: /donutsell <subcommand>
    permission: donutcore.sell.admin
  donutcrate:
    description: Main crate command
    usage: /donutcrate <subcommand>
    aliases: [dcrate, crate]
    permission: donutcore.crate.use
  enderchest:
    description: Open your ender chest
    usage: /enderchest [player]
    aliases: [echest]
    permission: enderchest.command
  clearechest:
    description: Clear a player's ender chest
    usage: /clearechest <player>
    aliases: [clearenderchest]
    permission: enderchest.clear

permissions:
  donutcore.crate.use:
    description: Open crates
    default: true
  donutcore.crate.admin:
    description: Manage crates
    default: op
  donutcore.crate.key.give:
    description: Give crate keys to players
    default: op
  donutcore.crate.key.pay:
    description: Pay crate keys to other players
    default: true
  donutcore.crate.stats:
    description: View crate stats
    default: true
  donutcore.sell.use:
    description: Use sell commands
    default: true
  donutcore.sell.admin:
    description: Admin sell commands
    default: op
  enderchest.command:
    description: Open own ender chest via command
    default: true
  enderchest.command.others:
    description: View other players' ender chests
    default: op
  enderchest.modify.others:
    description: Modify other players' ender chests when viewing
    default: op
  enderchest.clear:
    description: Clear a player's ender chest
    default: op
  enderchest.size.1:
    description: Ender chest with 9 slots (1 row)
    default: false
  enderchest.size.2:
    description: Ender chest with 18 slots (2 rows)
    default: false
  enderchest.size.3:
    description: Ender chest with 27 slots (3 rows)
    default: false
  enderchest.size.4:
    description: Ender chest with 36 slots (4 rows)
    default: false
  enderchest.size.5:
    description: Ender chest with 45 slots (5 rows)
    default: false
  enderchest.size.6:
    description: Ender chest with 54 slots (6 rows)
    default: op
